<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Digital Andon System (Cloud)</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
@keyframes pulse-red {
0%, 100% { background-color: #ef4444; }
50% { background-color: #991b1b; }
}
.emergency-blink {
animation: pulse-red 1s infinite;
}
.timer-glow {
text-shadow: 0 0 10px rgba(245, 158, 11, 0.5);
}
.category-scroll::-webkit-scrollbar {
width: 4px;
}
.category-scroll::-webkit-scrollbar-thumb {
background: #475569;
border-radius: 10px;
}
</style>
</head>
<body class="bg-slate-900 text-slate-100 min-h-screen font-sans">

<div id="app" class="max-w-5xl mx-auto p-4 pb-24">
<!-- Header -->
<header class="flex flex-col md:flex-row justify-between items-center mb-8 gap-4 bg-slate-800 p-6 rounded-2xl shadow-xl border border-slate-700">
<div>
<h1 class="text-3xl font-black tracking-tight text-white flex items-center gap-3">
<span id="connectionDot" class="w-4 h-4 bg-slate-600 rounded-full transition-colors"></span>
ANDON CLOUD
</h1>
<p class="text-slate-400 text-sm" id="userDisplay">Connecting to Firebase...</p>
</div>

<div class="flex items-center gap-4">
<button onclick="showSettingsModal()" class="p-2.5 rounded-xl bg-slate-700 hover:bg-slate-600 border border-slate-600">
<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path></svg>
</button>

<div class="flex items-center gap-3 bg-slate-700/50 p-3 rounded-xl border border-slate-600">
<span class="text-xs font-bold uppercase tracking-wider">Lead Mode</span>
<button id="leadToggle" onclick="toggleLeadMode()" class="relative inline-flex h-7 w-12 items-center rounded-full bg-slate-600 transition-colors">
<span id="leadToggleThumb" class="inline-block h-5 w-5 transform rounded-full bg-white transition-transform translate-x-1"></span>
</button>
</div>

<button onclick="showAddModal()" class="bg-blue-600 hover:bg-blue-500 text-white px-5 py-2.5 rounded-xl font-bold shadow-lg flex items-center gap-2">
<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
Add
</button>
</div>
</header>

<div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-8" id="statsBar"></div>
<div id="processGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6"></div>
</div>

<!-- Modals -->
<div id="modalOverlay" class="fixed inset-0 bg-black/80 backdrop-blur-sm hidden z-50 flex items-center justify-center p-4">
<div id="addProcessModal" class="bg-slate-800 border border-slate-700 rounded-2xl w-full max-w-md p-6 hidden">
<h2 class="text-xl font-bold mb-2">Add Division</h2>
<p class="text-slate-400 text-xs mb-4">Select a category to add to the board.</p>
<div class="grid grid-cols-2 gap-2 max-h-64 overflow-y-auto mb-6 pr-2 category-scroll">
<button onclick="addProcess('Installation')" class="p-3 bg-slate-700 hover:bg-blue-600 rounded-xl text-sm font-bold text-left flex items-center justify-between group transition-colors">Installation <span>+</span></button>
<button onclick="addProcess('Millwork')" class="p-3 bg-slate-700 hover:bg-blue-600 rounded-xl text-sm font-bold text-left flex items-center justify-between group transition-colors">Millwork <span>+</span></button>
<button onclick="addProcess('Systems')" class="p-3 bg-slate-700 hover:bg-blue-600 rounded-xl text-sm font-bold text-left flex items-center justify-between group transition-colors">Systems <span>+</span></button>
<button onclick="addProcess('Lamination')" class="p-3 bg-slate-700 hover:bg-blue-600 rounded-xl text-sm font-bold text-left flex items-center justify-between group transition-colors">Lamination <span>+</span></button>
<button onclick="addProcess('Upholstery')" class="p-3 bg-slate-700 hover:bg-blue-600 rounded-xl text-sm font-bold text-left flex items-center justify-between group transition-colors">U
