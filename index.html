<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Digital Andon System</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
@keyframes pulse-red { 0%, 100% { background-color: #ef4444; } 50% { background-color: #991b1b; } }
.emergency-blink { animation: pulse-red 1s infinite; }
button { -webkit-tap-highlight-color: transparent; touch-action: manipulation; }
.debug-log { font-family: monospace; font-size: 10px; color: #10b981; }
</style>
</head>
<body class="bg-slate-950 text-slate-100 min-h-screen font-sans overflow-x-hidden">

<!-- Step 1: Room Selection -->
<div id="setupOverlay" class="fixed inset-0 bg-slate-950 z-[100] flex items-center justify-center p-6">
<div class="bg-slate-900 border border-slate-800 p-8 rounded-3xl max-w-sm w-full shadow-2xl">
<div class="w-16 h-16 bg-blue-600 rounded-2xl flex items-center justify-center mx-auto mb-6 shadow-lg">
<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
</div>
<h2 class="text-2xl font-black text-center mb-2">Shop Connect</h2>
<p class="text-slate-500 text-sm text-center mb-6">Enter Shop ID to sync all boards.</p>

<input type="text" id="roomInput" placeholder="e.g. SHOP-A" class="w-full bg-slate-800 border border-slate-700 rounded-xl p-4 mb-4 text-center text-xl font-bold uppercase tracking-widest text-white outline-none focus:ring-2 focus:ring-blue-500">

<button id="connectBtn" class="w-full bg-blue-600 hover:bg-blue-500 py-4 rounded-xl font-black text-lg transition-all active:scale-95 shadow-lg">
CONNECT TO SHOP
</button>

<div id="debugOutput" class="mt-4 p-3 bg-black rounded-lg hidden">
<p class="text-[10px] uppercase font-bold text-slate-500 mb-1">Status Log:</p>
<div id="logContent" class="debug-log"></div>
</div>
</div>
</div>

<!-- Step 2: Main App -->
<div id="mainApp" class="hidden max-w-6xl mx-auto p-4 pb-20">
<header class="flex justify-between items-center bg-slate-900 border border-slate-800 p-4 rounded-2xl mb-6">
<div>
<h1 id="headerTitle" class="font-black text-xl text-white">---</h1>
<div class="flex items-center gap-2">
<div id="syncDot" class="w-2 h-2 bg-red-500 rounded-full"></div>
<span id="syncText" class="text-[10px] font-bold uppercase text-slate-500">Connecting...</span>
</div>
</div>
<div class="flex gap-2">
<button onclick="toggleLead()" id="leadBtn" class="px-3 py-2 bg-slate-800 border border-slate-700 rounded-lg text-[10px] font-bold uppercase">Lead: OFF</button>
<button onclick="location.reload()" class="px-3 py-2 bg-slate-800 border border-slate-700 rounded-lg text-[10px] font-bold uppercase">Reset</button>
</div>
</header>

<div id="grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4">
<!-- Stations injected here -->
</div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/11.1.0/firebase-app.js";
import { getAuth, signInAnonymously } from "https://www.gstatic.com/firebasejs/11.1.0/firebase-auth.js";
import { getFirestore, doc, collection, onSnapshot, updateDoc, setDoc, increment } from "https://www.gstatic.com/firebasejs/11.1.0/firebase-firestore.js";

// Import the functions you need from the SDKs you need
import { initializeApp } from "firebase/app";
import { getAnalytics } from "firebase/analytics";
// TODO: Add SDKs for Firebase products that you want to use
// https://firebase.google.com/docs/web/setup#available-libraries

// Your web app's Firebase configuration
// For Firebase JS SDK v7.20.0 and later, measurementId is optional
const firebaseConfig = {
apiKey: "AIzaSyD23yd-MlA4lMc1l95hgUulYE-4hIehRDg",
authDomain: "andon-f8690.firebaseapp.com",
databaseURL: "https://andon-f8690-default-rtdb.firebaseio.com",
projectId: "andon-f8690",
storageBucket: "andon-f8690.firebasestorage.app",
messagingSenderId: "83350352802",
appId: "1:83350352802:web:f3928af76cd3ebc62138fb",
measurementId: "G-E3FJFMD04V"
};

// Initialize Firebase
const app = initializeApp(firebaseConfig);
const analytics = getAnalytics(app);

const STATIONS = ['Installation', 'Millwork', 'Systems', 'Lamination', 'Upholstery', 'CNC', 'Finishing', 'Assembly'];
let db, auth, activeRoom, isLead = false;
let processes = [];

function log(msg) {
const out = document.getElementById('debugOutput');
const content = document.getElementById('logContent');
out.classList.remove('hidden');
content.innerHTML += > ${msg}<br>`;
console.log(msg);
}

document.getElementById('connectBtn').onclick = async () => {
const input = document.getElementById('roomInput').value.trim().toUpperCase();
if(!input) return;

activeRoom = input;
log(Attempting connection to${input}...`);

try {
const app = initializeApp(firebaseConfig);
auth = getAuth(app);
db = getFirestore(app);

log("Firebase Initialized.");

await signInAnonymously(auth);
log("Logged in anonymously.");

startSync();

document.getElementById('setupOverlay').classList.add('hidden');
document.getElementById('mainApp').classList.remove('hidden');
document.getElementById('headerTitle').innerText = SHOP: ${activeRoom}`;

} catch (err) {
log(ERROR:${err.message}`);
}
};

function startSync() {
const path = artifacts/andon-v2/public/data/${activeRoom}/stations`;

onSnapshot(collection(db, path), (snap) => {
document.getElementById('syncDot').className = "w-2 h-2 bg-green-500 rounded-full shadow-[0_0_5px_green]";
document.getElementById('syncText').innerText = "Live Sync Active";

if(snap.empty) {
log("Creating stations for the first time...");
STATIONS.forEach((name, i) => {
setDoc(doc(db, path, st-${i}), { name, status: 'normal', order: i }); }); } else { processes = snap.docs.map(d =&gt; ({ id: d.id, ...d.data() })).sort((a,b) =&gt; a.order - b.order); render(); } }, (err) =&gt; { log(Sync Error: ${err.message});
document.getElementById('syncDot').className = "w-2 h-2 bg-red-500 rounded-full";
document.getElementById('syncText').innerText = "Sync Failed";
});
}

window.updateStatus = async (id, status) => {
const path = artifacts/andon-v2/public/data/${activeRoom}/stations`;
try {
await updateDoc(doc(db, path, id), { status });
} catch (e) {
alert("Update failed: " + e.message);
}
};

window.toggleLead = () => {
isLead = !isLead;
const btn = document.getElementById('leadBtn');
btn.innerText = isLead ? "Lead: ON" : "Lead: OFF";
btn.classList.toggle('bg-blue-600', isLead);
btn.classList.toggle('border-blue-400', isLead);
};

function render() {
const grid = document.getElementById('grid');
grid.innerHTML = '';

processes.forEach(p => {
const card = document.createElement('div');
let bg = "bg-slate-900 border-slate-800";
let dot = "bg-green-500";

if(p.status === 'warning') {
bg = "bg-amber-500/10 border-amber-500/50";
dot = "bg-amber-500 shadow-[0_0_10px_orange]";
} else if(p.status === 'critical') {
bg = "emergency-blink border-red-500";
dot = "bg-white";
}

card.className = ${bg} border-2 p-5 rounded-2xl transition-all duration-300; card.innerHTML =
<div class="flex justify-between items-start mb-6">
<h3 class="font-black text-sm uppercase tracking-tight">${p.name}&lt;/h3&gt; &lt;div class="w-3 h-3 rounded-full ${dot}"></div>
</div>
<div class="grid grid-cols-3 gap-2">
<button onclick="updateStatus('${p.id}', 'normal')" class="py-3 rounded-xl text-[10px] font-bold uppercase border ${p.status === 'normal' ? 'bg-green-600 border-green-400' : 'bg-slate-800 border-slate-700'}">Run</button>
<button onclick="updateStatus('${p.id}', 'warning')" class="py-3 rounded-xl text-[10px] font-bold uppercase border ${p.status === 'warning' ? 'bg-amber-500 border-amber-300 text-black' : 'bg-slate-800 border-slate-700'}">Help</button>
<button onclick="updateStatus('${p.id}', 'critical')" class="py-3 rounded-xl text-[10px] font-bold uppercase border ${p.status === 'critical' ? 'bg-white text-red-600 border-white' : 'bg-slate-800 border-slate-700'}"&gt;Stop&lt;/button&gt; &lt;/div&gt;;
grid.appendChild(card);
});
}
</script>
</body>
</html>
