<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Digital Andon Board</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
@keyframes pulse-red {
0%, 100% { background-color: #ef4444; }
50% { background-color: #991b1b; }
}
.emergency-blink { animation: pulse-red 1s infinite; }
.timer-glow { text-shadow: 0 0 10px rgba(245, 158, 11, 0.5); }
/* Prevent selection blue highlight on mobile buttons */
button { -webkit-tap-highlight-color: transparent; }
</style>
</head>
<body class="bg-slate-900 text-slate-100 min-h-screen font-sans selection:bg-blue-500/30">

<!-- Room Selection Overlay -->
<div id="roomSelectionOverlay" class="fixed inset-0 bg-slate-950 z-[100] flex items-center justify-center p-6">
<div class="bg-slate-900 border border-slate-700 p-8 rounded-3xl max-w-sm w-full shadow-2xl text-center">
<div class="w-16 h-16 bg-blue-600 rounded-2xl flex items-center justify-center mx-auto mb-6 shadow-lg shadow-blue-500/20">
<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path><circle cx="9" cy="7" r="4"></circle><path d="M23 21v-2a4 4 0 0 0-3-3.87"></path><path d="M16 3.13a4 4 0 0 1 0 7.75"></path></svg>
</div>
<h2 class="text-2xl font-black mb-2">Shop Floor Connect</h2>
<p class="text-slate-400 text-sm mb-6">Enter your Shop ID to sync boards.</p>
<input type="text" id="roomInput" placeholder="e.g. SHOP1" class="w-full bg-slate-800 border border-slate-700 rounded-xl p-4 mb-4 text-center text-xl font-bold focus:ring-2 focus:ring-blue-500 outline-none uppercase tracking-widest text-white">
<button id="joinBtn" class="w-full bg-blue-600 hover:bg-blue-500 py-4 rounded-xl font-black text-lg transition-all shadow-lg active:scale-95">CONNECT</button>
</div>
</div>

<div id="app" class="max-w-6xl mx-auto p-4 pb-24 hidden">
<header class="flex flex-col md:flex-row justify-between items-center mb-8 gap-4 bg-slate-800 p-5 rounded-2xl border border-slate-700 shadow-xl">
<div class="text-center md:text-left">
<h1 class="text-2xl font-black tracking-tight text-white flex items-center justify-center md:justify-start gap-3">
<span id="connectionDot" class="w-3 h-3 bg-slate-600 rounded-full"></span>
<span id="roomDisplay">---</span>
</h1>
<p id="statusMsg" class="text-slate-500 text-[10px] uppercase font-bold tracking-widest mt-1">Initializing...</p>
</div>

<div class="flex items-center gap-2">
<button onclick="showStatsModal()" class="flex items-center gap-2 px-4 py-2.5 rounded-xl bg-indigo-600 hover:bg-indigo-500 text-white font-bold transition-all active:scale-95 text-sm">
Stats
</button>
<button onclick="showSettingsModal()" class="p-2.5 rounded-xl bg-slate-700 border border-slate-600 active:scale-95">
<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path></svg>
</button>
<div class="flex items-center gap-2 bg-slate-900/50 p-2 rounded-xl border border-slate-700">
<span class="text-[10px] font-bold uppercase">Lead</span>
<button id="leadToggle" onclick="window.toggleLeadMode()" class="relative inline-flex h-6 w-11 items-center rounded-full bg-slate-700 transition-colors">
<span id="leadToggleThumb" class="inline-block h-4 w-4 transform rounded-full bg-white transition-transform translate-x-1"></span>
</button>
</div>
</div>
</header>

<div class="grid grid-cols-2 md:grid-cols-4 gap-3 mb-6" id="statsBar"></div>
<div id="processGrid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4"></div>
</div>

<!-- Modals -->
<div id="modalOverlay" class="fixed inset-0 bg-black/90 backdrop-blur-md hidden z-[200] flex items-center justify-center p-4">
<div id="settingsModal" class="bg-slate-800 border border-slate-700 rounded-3xl w-full max-w-sm p-6 hidden">
<h2 class="text-xl font-bold mb-4">Settings</h2>
<label class="block text-[10px] font-bold uppercase text-slate-500 mb-4 tracking-widest">Escalation Timeout (Min)</label>
<div class="flex items-center gap-4 mb-8">
<input type="range" id="timeoutRange" min="1" max="60" value="10" class="flex-1 accent-blue-500" oninput="document.getElementById('timeoutLabel').innerText = this.value">
<span id="timeoutLabel" class="text-2xl font-black text-blue-400 w-10">10</span>
</div>
<div class="flex gap-2">
<button onclick="closeModals()" class="flex-1 py-4 rounded-xl bg-slate-700 font-bold">Cancel</button>
<button id="saveSettingsBtn" class="flex-1 py-4 rounded-xl bg-blue-600 font-bold">Save</button>
</div>
</div>

<div id="statsModal" class="bg-slate-800 border border-slate-700 rounded-3xl w-full max-w-sm p-6 hidden">
<h2 class="text-xl font-bold mb-6">Total Incidents</h2>
<div class="grid grid-cols-2 gap-3 mb-8">
<div class="bg-amber-500/10 border border-amber-500/20 p-4 rounded-2xl text-center">
<p class="text-[10px] font-bold text-amber-500 uppercase mb-1">Help</p>
<p id="totalHelpStat" class="text-4xl font-black text-amber-500">0</p>
</div>
<div class="bg-red-500/10 border border-red-500/20 p-4 rounded-2xl text-center">
<p class="text-[10px] font-bold text-red-500 uppercase mb-1">Fires</p>
<p id="totalFireStat" class="text-4xl font-black text-red-500">0</p>
</div>
</div>
<button onclick="closeModals()" class="w-full py-4 rounded-xl bg-slate-700 font-bold">Close</button>
</div>
</div>

<!-- Alert Toast -->
<div id="alertToast" class="fixed bottom-6 right-6 left-6 md:left-auto md:w-80 transform translate-y-40 transition-transform duration-500 z-[300]">
<div id="toastContainer" class="p-4 rounded-2xl shadow-2xl flex items-center justify-between text-white">
<div class="flex items-center gap-3">
<div class="bg-white/20 p-2 rounded-lg">🔔</div>
<div>
<p id="toastTitle" class="text-[10px] font-bold uppercase opacity-80"></p>
<p id="toastMsg" class="font-bold"></p>
</div>
</div>
<button onclick="document.getElementById('alertToast').classList.add('translate-y-40')" class="p-1">✕</button>
</div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/11.1.0/firebase-app.js";
import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.1.0/firebase-auth.js";
import { getFirestore, doc, collection, setDoc, updateDoc, onSnapshot, increment } from "https://www.gstatic.com/firebasejs/11.1.0/firebase-firestore.js";

// CONFIGURATION FROM YOUR IMAGE
const firebaseConfig = {
apiKey: "AIzaSyD23yd-MlA4lMc1l95hgUulYE-4hIehRDg",
authDomain: "andon-f8690.firebaseapp.com",
projectId: "andon-f8690",
storageBucket: "andon-f8690.firebasestorage.app",
messagingSenderId: "83350352802",
appId: "1:83350352802:web:f3928af76cd3ebc62138fb",
measurementId: "G-E3FJFMD04V"
};

const STATIONS = ['Installation', 'Millwork', 'Systems', 'Lamination', 'Upholstery', 'CNC', 'Finishing', 'Assembly'];

let db, auth, currentUser, activeRoom, unsubscribe = [];
let processes = [];
let isLeadMode = false;
let warningTimeout = 10;
let audioCtx = null;

const appDiv = document.getElementById('app');
const roomOverlay = document.getElementById('roomSelectionOverlay');

// JOIN ROOM
document.getElementById('joinBtn').onclick = async () => {
const val = document.getElementById('roomInput').value.trim().toUpperCase();
if(!val) return;
activeRoom = val;
document.getElementById('roomDisplay').innerText = ROOM: ${val}`;
roomOverlay.classList.add('hidden');
appDiv.classList.remove('hidden');
initFirebase();
};

async function initFirebase() {
const fbApp = initializeApp(firebaseConfig);
auth = getAuth(fbApp);
db = getFirestore(fbApp);

onAuthStateChanged(auth, (user) => {
if (user) {
currentUser = user;
document.getElementById('connectionDot').className = "w-3 h-3 bg-green-500 rounded-full shadow-[0_0_8px_#22c55e]";
document.getElementById('statusMsg').innerText = "Live Sync Active";
startListeners();
} else {
signInAnonymously(auth).catch(console.error);
}
});
}

function startListeners() {
// Clean old listeners
unsubscribe.forEach(un => un());

const appId = "andon-v1"; // Internal app namespace
const base = artifacts/${appId}/public/data/${activeRoom};

// 1. Listen for Config
unsubscribe.push(onSnapshot(doc(db, ``${base}/config/settings`), (s) => {
if(s.exists()) {
warningTimeout = s.data().timeout || 10;
document.getElementById('timeoutRange').value = warningTimeout;
document.getElementById('timeoutLabel').innerText = warningTimeout;
}
}));

// 2. Listen for Stats
unsubscribe.push(onSnapshot(doc(db, ${base}/config/statistics`), (s) => {
const data = s.data() || { help: 0, fire: 0 };
document.getElementById('totalHelpStat').innerText = data.help || 0;
document.getElementById('totalFireStat').innerText = data.fire || 0;
}));

// 3. Listen for Stations
unsubscribe.push(onSnapshot(collection(db, ``${base}/stations), (snap) =&gt; { if (snap.empty) { // Seed initial stations STATIONS.forEach((name, i) =&gt; { setDoc(doc(db,{i}`), {
name, status: 'normal', order: i, endTime: null
});
});
return;
}

const oldStatuses = new Map(processes.map(p => [p.id, p.status]));
processes = snap.docs.map(d => ({ id: d.id, ...d.data() })).sort((a,b) => a.order - b.order);

// Lead mode notifications
if(isLeadMode) {
processes.forEach(p => {
const old = oldStatuses.get(p.id);
if (p.status !== 'normal' && p.status !== old && old !== undefined) {
triggerAlarm(p);
}
});
}
renderBoard();
}));
}

window.setStatus = async (id, status) => {
if(!currentUser) return;
const p = processes.find(x => x.id === id);
if(!p || p.status === status) return;

const appId = "andon-v1";
const base = artifacts/${appId}/public/data/${activeRoom};

let update = { status };
if(status === 'warning') {
update.endTime = Date.now() + (warningTimeout * 60000);
setDoc(doc(db, ${base}/config/statistics), { help: increment(1) }, { merge: true }); } else if (status === 'critical') { update.endTime = null; setDoc(doc(db, ``${base}/config/statistics), { fire: increment(1) }, { merge: true });
} else {
update.endTime = null;
}

await updateDoc(doc(db, ${base}/stations`, id), update);
};

function renderBoard() {
const grid = document.getElementById('processGrid');
grid.innerHTML = '';

processes.forEach(p => {
const card = document.createElement('div');
let theme = 'bg-slate-800 border-slate-700';
let dot = 'bg-green-500';
let timerText = '<div class="text-[10px] text-slate-500 font-bold uppercase mt-2">Operational</div>';

if(p.status === 'warning') {
theme = 'bg-amber-500/10 border-amber-500/50';
dot = 'bg-amber-500 shadow-[0_0_10px_orange]';
timerText = <div id="timer-${p.id}" class="text-2xl font-black text-amber-500 tabular-nums mt-1">--:--</div>`;
} else if(p.status === 'critical') {
theme = 'emergency-blink border-red-500 shadow-lg';
dot = 'bg-white';
timerText = '<div class="text-xs font-black text-white uppercase mt-2">STOPPED</div>';
}

card.className = ${theme} border-2 p-4 rounded-2xl transition-all duration-300; card.innerHTML =
<div class="flex justify-between items-start">
<h3 class="font-black text-sm uppercase tracking-tighter">${p.name}&lt;/h3&gt; &lt;div class="w-3 h-3 rounded-full ${dot}"></div>
</div>
${timerText} &lt;div class="grid grid-cols-3 gap-1 mt-6"&gt; &lt;button onclick="setStatus('${p.id}','normal')" class="py-3 rounded-lg text-[10px] font-bold uppercase border ${p.status === 'normal' ? 'bg-green-600 border-green-400' : 'bg-slate-700 border-slate-600'}"&gt;Run&lt;/button&gt; &lt;button onclick="setStatus('${p.id}','warning')" class="py-3 rounded-lg text-[10px] font-bold uppercase border ${p.status === 'warning' ? 'bg-amber-500 border-amber-300 text-black' : 'bg-slate-700 border-slate-600'}"&gt;Help&lt;/button&gt; &lt;button onclick="setStatus('${p.id}','critical')" class="py-3 rounded-lg text-[10px] font-bold uppercase border ${p.status === 'critical' ? 'bg-white border-white text-red-600' : 'bg-slate-700 border-slate-600'}"&gt;Fire&lt;/button&gt; &lt;/div&gt;;
grid.appendChild(card);
});
updateSummary();
}

function updateSummary() {
const bar = document.getElementById('statsBar');
const critical = processes.filter(p => p.status === 'critical').length;
const warning = processes.filter(p => p.status === 'warning').length;
bar.innerHTML = &lt;div class="bg-slate-800 border border-slate-700 p-3 rounded-xl text-center"&gt;&lt;p class="text-[8px] font-bold opacity-40"&gt;TOTAL&lt;/p&gt;&lt;p class="text-xl font-black"&gt;${processes.length}</p></div>
<div class="bg-slate-800 border border-slate-700 p-3 rounded-xl text-center"><p class="text-[8px] font-bold text-green-500">OK</p><p class="text-xl font-black text-green-500">${processes.length - critical - warning}&lt;/p&gt;&lt;/div&gt; &lt;div class="bg-slate-800 border border-slate-700 p-3 rounded-xl text-center"&gt;&lt;p class="text-[8px] font-bold text-amber-500"&gt;HELP&lt;/p&gt;&lt;p class="text-xl font-black text-amber-500"&gt;${warning}</p></div>
<div class="bg-slate-800 border border-slate-700 p-3 rounded-xl text-center"><p class="text-[8px] font-bold text-red-500">STOP</p><p class="text-xl font-black text-red-500">${critical}&lt;/p&gt;&lt;/div&gt;;
}

setInterval(() => {
processes.forEach(p => {
if(p.status === 'warning' && p.endTime) {
const diff = p.endTime - Date.now();
if(diff <= 0) {
setStatus(p.id, 'critical');
} else {
const el = document.getElementById(timer-${p.id}); if(el) { const m = Math.floor(diff/60000); const s = Math.floor((diff%60000)/1000); el.innerText = ``${m}:${s.toString().padStart(2,'0')}`;
}
}
}
});
}, 1000);

window.toggleLeadMode = () => {
isLeadMode = !isLeadMode;
if(!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
const t = document.getElementById('leadToggleThumb');
const b = document.getElementById('leadToggle');
t.style.transform = isLeadMode ? 'translateX(1.25rem)' : 'translateX(0)';
b.className = isLeadMode ? 'relative inline-flex h-6 w-11 items-center rounded-full bg-blue-600 transition-colors' : 'relative inline-flex h-6 w-11 items-center rounded-full bg-slate-700 transition-colors';
};

function triggerAlarm(p) {
if(audioCtx) {
const o = audioCtx.createOscillator();
const g = audioCtx.createGain();
o.connect(g); g.connect(audioCtx.destination);
o.frequency.value = p.status === 'critical' ? 520 : 440;
g.gain.setTargetAtTime(0.1, audioCtx.currentTime, 0.05);
o.start(); o.stop(audioCtx.currentTime + 0.3);
}
const toast = document.getElementById('alertToast');
const container = document.getElementById('toastContainer');
document.getElementById('toastTitle').innerText = p.status === 'critical' ? 'FIRE ALERT' : 'ASSISTANCE NEEDED';
document.getElementById('toastMsg').innerText = ``${p.name} Station; container.className =p-4 rounded-2xl shadow-2xl flex items-center justify-between text-white ${p.status === 'critical' ? 'bg-red-600' : 'bg-amber-600'};
toast.classList.remove('translate-y-40');
}

// Global helpers
window.showSettingsModal = () => { document.getElementById('modalOverlay').classList.remove('hidden'); document.getElementById('settingsModal').classList.remove('hidden'); document.getElementById('statsModal').classList.add('hidden'); };
window.showStatsModal = () => { document.getElementById('modalOverlay').classList.remove('hidden'); document.getElementById('statsModal').classList.remove('hidden'); document.getElementById('settingsModal').classList.add('hidden'); };
window.closeModals = () => document.getElementById('modalOverlay').classList.add('hidden');
document.getElementById('saveSettingsBtn').onclick = async () => {
const appId = "andon-v1";
await setDoc(doc(db, artifacts/${appId}/public/data/${activeRoom}/config/settings`), { timeout: warningTimeout });
closeModals();
};
</script>
</body>
</html>
